name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: knot-x86_64-unknown-linux-gnu

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: knot-x86_64-apple-darwin

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: knot-aarch64-apple-darwin

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: knot-x86_64-pc-windows-msvc.exe

    steps:
      - uses: actions/checkout@v6

      - name: Sync manifests from Cargo.toml
        run: python3 scripts/sync-manifests.py

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p release
          EXT=$([[ "$RUNNER_OS" == "Windows" ]] && echo ".exe" || echo "")
          cp "target/${{ matrix.target }}/release/knot${EXT}" "release/${{ matrix.artifact }}"

      - name: Checksum
        shell: bash
        run: |
          cd release
          if command -v sha256sum &>/dev/null; then
            sha256sum ${{ matrix.artifact }} >> SHA256SUMS
          else
            shasum -a 256 ${{ matrix.artifact }} >> SHA256SUMS
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
